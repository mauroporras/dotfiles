version: "3"

tasks:
  build:
    cmds:
      - pnpm run build

  clear-rr-cache:
    cmds:
      - rm -rf .git/rr-cache

  dev:
    preconditions:
      - sh: which jq
        msg: Missing "jq" command-line utility.
    env:
      SOME_PREFIX_LATEST_VERSION:
        sh: jq -r .version ../desktop/package.json
    cmds:
      - pnpm run dev

  format:
    desc: Format all files
    cmds:
      - pnpm run format

  format:changed:
    desc: Format only Git changed files
    cmds:
      - "{ git diff --relative --name-only --diff-filter=ACMR; git diff --relative --staged --name-only --diff-filter=ACMR; } | sort -u | xargs -r pnpm exec prettier --write --ignore-unknown"

  format:check:
    desc: Check files formatting
    cmds:
      - pnpm run format:check

  install:
    cmds:
      - pnpm install

  start:
    env:
      SOME_PREFIX_LATEST_VERSION:
        sh: jq -r .version ../desktop/package.json
    cmds:
      - pnpm run start

  use:env:
    internal: true
    preconditions:
      - sh: test -f shell.{{.ENV_NAME}}.nix
        msg: Missing "shell.{{.ENV_NAME}}.nix" file.
    cmds:
      - cp shell.{{.ENV_NAME}}.nix shell.nix
      # - direnv allow

  use:dev:
    cmds:
      - task: use:env
        vars:
          ENV_NAME: development

  use:prod:
    cmds:
      - task: use:env
        vars:
          ENV_NAME: production
