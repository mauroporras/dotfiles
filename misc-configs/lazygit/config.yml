# See:
# https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md#default

gui:
  authorColors:
    mauroporras: magenta
    "Mauro Pineda": magenta
    "Claude": yellow
  branchColorPatterns:
    "^alpha$": cyan
    "^main$": cyan
    "^master$": cyan
    "^beta$": yellow
    "^production$": magenta
  scrollHeight: 1
  expandFocusedSidePanel: true
  shrinkSidePanelsToContent: true
  timeFormat: "2006-01-02 15:04"
  shortTimeFormat: "15:04"
  theme:
    selectedLineBgColor:
      - white
    cherryPickedCommitBgColor:
      - black
    cherryPickedCommitFgColor:
      - green
  showNumstatInFilesView: true
  nerdFontsVersion: "3"
  # It's better to use the default value of 7 since it can throw off the
  # recognition of commit hashes in remote VPSs.
  # Match Git's 7-char short hash after committing.
  #commitHashLength: 7
  showDivergenceFromBaseBranch: arrowAndNumber
git:
  # Change it using the `|` and `\` keys.
  pagers:
    - name: "delta"
      pager: delta --paging=never
    - name: "delta side-by-side"
      pager: delta --paging=never --side-by-side
    - name: "cat"
      pager: cat
  mainBranches:
    - alpha
    - main
    - master
  # The number of lines to show around diff hunks.
  # Changed it using the `{` and `}` keys.
  diffContextSize: 15
  # Change it from the branches panel using the `s` key.
  #localBranchSortOrder: alphabetical
refresher:
  externalChangeCheckInterval: 3
customCommands:
  - key: "I"
    context: "files"
    description: "Invert staged/unstaged files"
    command: |
      bash -c '
        staged=$(git diff --cached --name-only)
        unstaged=$(git diff --name-only)
        untracked=$(git ls-files --others --exclude-standard)
        git reset -q -- $staged 2>/dev/null
        git add -- $unstaged $untracked 2>/dev/null
      '
  - key: "w"
    context: "files"
    description: "Work In Progress"
    command: "git wip"
  - key: "W"
    context: "files"
    description: "Work In Progress and push"
    command: "git wipp"
